# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - intelliquiz

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x' # Note: Node 24 is very new/unstable. Recommend 18 or 20 LTS for Azure.

      - name: npm install, build, and test
        run: |
          npm ci --only=production # Use 'ci' for lockfile consistency and only prod deps
          npx prisma generate
          npm run build --if-present

      # OPTIONAL: If you have tests, run them here before deploying
      # - name: Run tests
      #   run: npm test

      - name: Create .deployment file
        run: |
          echo "[config]" > .deployment
          echo "SCM_DO_BUILD_DURING_DEPLOYMENT=false" >> .deployment
          # This tells Kudu NOT to try to build/install again, but also NOT to optimize node_modules if they exist.
          # However, since we are EXCLUDING node_modules below, this is less critical, but good practice.

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          # CRITICAL CHANGE: Exclude node_modules, .git, and other junk
          path: |
            .
            !node_modules/
            !.git/
            !.github/
            !*.md
            !tests/
            !dist/ # If your build output is in dist, include it specifically instead of '.' if needed
            !coverage/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5917B279EBD6439F9717F80AB2B7FB43 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6D1B98A236BF4BCF9C5B13EF5260547E }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E8ECD423FB51480996D283595D4C5246 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'intelliquiz'
          slot-name: 'Production'
          package: .
